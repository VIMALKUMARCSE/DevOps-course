name: CI-CD Pipeline

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20

      # Build backend
      - run: npm ci
        working-directory: ./server
      - run: npm run build
        working-directory: ./server

      # Build frontend
      - run: npm ci
        working-directory: ./client
      - run: npm run build
        working-directory: ./client

      # Docker login
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build backend image
      - uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: vimal1026/backend:${{ github.sha }}

      # Build frontend image
      - uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: vimal1026/frontend:${{ github.sha }}

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - name: Create SSH key
        run: |
          echo "${{ secrets.EC2_KEY }}" > dev_key.pem
          chmod 600 dev_key.pem

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i dev_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            cd ${{ secrets.EC2_APP_DIR }}/Docker-compose
            export TAG=${{ github.sha }}
            docker compose pull
            docker compose up -d
          EOF
